<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Papa's Pastaria</title>
  <link rel="icon" type="image/x-icon" href="papaspastaria.jpg">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #game-container {
      height: 100vh;        /* Full browser height */
      aspect-ratio: 4 / 3;  /* Keeps SWF proportions */
      max-width: 100vw;     /* Prevents overflow */
    }

    #game-container ruffle-player {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      window.RufflePlayer = window.RufflePlayer || {};
      const ruffle = window.RufflePlayer.newest();
      const player = ruffle.createPlayer();
      document.getElementById("game-container").appendChild(player);
      player.load("papaspastaria.swf");
    });
  </script>
</body>
</html>
